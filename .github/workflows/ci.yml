name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  secrets-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edu-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: edu-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate migration ordering/idempotency
        run: npm run migrations:validate

      - name: Lint backend
        run: npm run lint

      - name: Run backend tests
        run: npm test

      - name: Enforce backend test coverage threshold
        run: npm run test:coverage

      - name: Backend dependency audit (high+)
        run: npm audit --omit=dev --audit-level=high

  frontend:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edu-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: edu-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Frontend dependency audit (high+)
        run: npm audit --omit=dev --audit-level=high
