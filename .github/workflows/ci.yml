name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    name: Backend Test Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edu-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: edu-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

  frontend:
    name: Frontend Lint and Build Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edu-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: edu-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
